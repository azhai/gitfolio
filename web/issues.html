<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue - gitfolio-core - GitFolio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .issues-page {
            max-width: 100%;
        }

        .project-header {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .project-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .project-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .project-title-section h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .project-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .project-breadcrumb a:hover {
            text-decoration: underline;
        }

        .project-actions-bar {
            display: flex;
            gap: 10px;
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .project-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }

        .project-tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-tab:hover {
            color: var(--text-primary);
            background: var(--bg-color);
        }

        .project-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-color);
        }

        .project-tab .badge {
            position: static;
            background: var(--bg-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .project-tab.active .badge {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .issues-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .issues-title {
            font-size: 24px;
            font-weight: 600;
        }

        .issues-tabs {
            display: flex;
            gap: 0;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .issues-tab {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .issues-tab:hover {
            color: var(--text-primary);
            background: var(--bg-color);
        }

        .issues-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-color);
        }

        .issues-tab .count {
            padding: 2px 8px;
            background: var(--bg-color);
            border-radius: 12px;
            font-size: 11px;
        }

        .issues-tab.active .count {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .issues-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-issues {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-issues input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-issues input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-issues i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-dropdown {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-dropdown:hover {
            border-color: var(--primary-color);
        }

        .issues-list {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .issue-row {
            display: flex;
            align-items: flex-start;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .issue-row:last-child {
            border-bottom: none;
        }

        .issue-row:hover {
            background: var(--bg-color);
        }

        .issue-checkbox {
            margin-right: 15px;
            margin-top: 3px;
        }

        .issue-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .issue-icon {
            width: 20px;
            margin-right: 12px;
            margin-top: 2px;
        }

        .issue-icon.open {
            color: var(--success-color);
        }

        .issue-icon.closed {
            color: var(--danger-color);
        }

        .issue-content {
            flex: 1;
        }

        .issue-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .issue-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .issue-title a:hover {
            color: var(--primary-color);
        }

        .issue-labels {
            display: inline-flex;
            gap: 6px;
            margin-left: 8px;
        }

        .issue-label {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .issue-label.bug {
            background: rgba(201, 28, 0, 0.1);
            color: var(--danger-color);
        }

        .issue-label.feature {
            background: rgba(31, 117, 203, 0.1);
            color: var(--info-color);
        }

        .issue-label.enhancement {
            background: rgba(128, 91, 183, 0.1);
            color: #805bb7;
        }

        .issue-label.documentation {
            background: rgba(16, 133, 72, 0.1);
            color: var(--success-color);
        }

        .issue-label.help-wanted {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .issue-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .issue-meta a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .issue-meta a:hover {
            color: var(--primary-color);
        }

        .issue-assignees {
            display: flex;
            margin-left: 15px;
        }

        .issue-assignee {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            margin-left: -8px;
        }

        .issue-assignee:first-child {
            margin-left: 0;
        }

        .issue-comments {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .new-issue-btn {
            background: var(--success-color);
            color: white;
        }

        .new-issue-btn:hover {
            background: #0d6d3b;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 16px 0;
        }

        .pagination-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(252, 109, 38, 0.05);
        }

        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-ellipsis {
            padding: 0 8px;
            color: var(--text-muted);
        }

        .pagination-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 16px;
        }

        .pagination-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 768px) {
            .issues-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .search-issues {
                max-width: 100%;
            }

            .pagination {
                flex-wrap: wrap;
            }

            .pagination-info {
                width: 100%;
                text-align: center;
                margin-bottom: 12px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="/" class="logo">
                    <i class="fas fa-code-branch"></i>
                    <span>GitFolio</span>
                </a>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索项目、Issue、合并请求...">
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <div class="user-menu">
                    <img src="https://via.placeholder.com/32" alt="用户头像" class="avatar">
                    <span class="username">ryan</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <a href="/" class="nav-item">
                            <i class="fas fa-home"></i>
                            <span>仪表盘</span>
                        </a>
                        <a href="/projects" class="nav-item active">
                            <i class="fas fa-folder"></i>
                            <span>项目</span>
                        </a>
                        <a href="/groups" class="nav-item">
                            <i class="fas fa-users"></i>
                            <span>群组</span>
                        </a>
                        <a href="/activity" class="nav-item">
                            <i class="fas fa-chart-line"></i>
                            <span>活动</span>
                        </a>
                        <a href="/milestones" class="nav-item">
                            <i class="fas fa-flag"></i>
                            <span>里程碑</span>
                        </a>
                        <a href="/snippets" class="nav-item">
                            <i class="fas fa-code"></i>
                            <span>代码片段</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <main class="content">
                <div class="issues-page">
                    <div class="project-header">
                        <div class="project-header-top">
                            <div class="project-title-section">
                                <h1 id="repo-name">加载中...</h1>
                                <span class="project-visibility" id="repo-visibility">公开</span>
                            </div>
                            <div class="project-actions-bar">
                                <button class="btn btn-sm">
                                    <i class="fas fa-star"></i> 星标
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-code-branch"></i> Fork
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-clone"></i> 克隆
                                </button>
                            </div>
                        </div>
                        <div class="project-breadcrumb">
                            <a href="#" id="owner-link">加载中</a>
                            <span>/</span>
                            <span id="repo-name-breadcrumb">加载中</span>
                        </div>
                        <p class="project-description" id="repo-description">加载中...</p>
                    </div>

                    <div class="project-tabs">
                        <a href="#" class="project-tab" id="tab-code">
                            <i class="fas fa-code"></i>
                            代码
                        </a>
                        <a href="#" class="project-tab active" id="tab-issues">
                            <i class="fas fa-exclamation-circle"></i>
                            Issue
                            <span class="badge" id="issues-count">0</span>
                        </a>
                        <a href="#" class="project-tab" id="tab-mrs">
                            <i class="fas fa-code-branch"></i>
                            合并请求
                            <span class="badge" id="mrs-count">0</span>
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-cube"></i>
                            发布
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-chart-line"></i>
                            统计
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-cog"></i>
                            设置
                        </a>
                    </div>

                    <div class="issues-header">
                        <h1 class="issues-title">Issue</h1>
                        <button class="btn new-issue-btn">
                            <i class="fas fa-plus"></i> 新建 Issue
                        </button>
                    </div>

                    <div class="issues-tabs">
                        <a href="#" class="issues-tab active" id="tab-open">
                            <i class="fas fa-exclamation-circle"></i>
                            打开
                            <span class="count" id="open-count">0</span>
                        </a>
                        <a href="#" class="issues-tab" id="tab-closed">
                            <i class="fas fa-check-circle"></i>
                            已关闭
                            <span class="count" id="closed-count">0</span>
                        </a>
                        <a href="#" class="issues-tab" id="tab-all">
                            <i class="fas fa-list"></i>
                            全部
                            <span class="count" id="all-count">0</span>
                        </a>
                    </div>

                    <div class="issues-filters">
                        <div class="search-issues">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="搜索 Issue..." id="search-input">
                        </div>

                        <select class="filter-dropdown">
                            <option>标签</option>
                            <option>Bug</option>
                            <option>Feature</option>
                            <option>Enhancement</option>
                            <option>Documentation</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>里程碑</option>
                            <option>v1.0.0</option>
                            <option>v1.1.0</option>
                            <option>v2.0.0</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>指派给</option>
                            <option>ryan</option>
                            <option>alice</option>
                            <option>bob</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>排序</option>
                            <option>最近创建</option>
                            <option>最近更新</option>
                            <option>评论最多</option>
                        </select>
                    </div>

                    <div class="issues-list" id="issues-list">
                        <div class="loading">加载中...</div>
                    </div>

                    <div class="pagination">
                        <span class="pagination-info" id="pagination-info">加载中...</span>
                        <div class="pagination-nav">
                            <button class="pagination-btn" disabled id="prev-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button class="pagination-btn active">1</button>
                            <button class="pagination-btn" id="next-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/api.js?v=3"></script>
    <script src="/static/app.js?v=3"></script>
    <script>
        let currentOwner = '';
        let currentRepo = '';
        let currentFilter = 'open';

        async function initIssuesPage() {
            const urlParams = new URLSearchParams(window.location.search);
            currentOwner = urlParams.get('owner');
            currentRepo = urlParams.get('repo');

            if (!currentOwner || !currentRepo) {
                showNotification('缺少项目参数', 'error');
                return;
            }

            try {
                const repoData = await RepositoryService.get(currentOwner, currentRepo);
                
                document.getElementById('repo-name').textContent = repoData.name;
                document.getElementById('repo-name-breadcrumb').textContent = repoData.name;
                document.getElementById('owner-link').textContent = currentOwner;
                document.getElementById('owner-link').href = `/projects?owner=${currentOwner}`;
                document.getElementById('repo-description').textContent = repoData.description || '暂无描述';
                document.getElementById('repo-visibility').textContent = repoData.is_private ? '私有' : '公开';
                
                document.getElementById('tab-code').href = `/project-detail?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-issues').href = `/issues?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-mrs').href = `/merge-requests?owner=${currentOwner}&repo=${currentRepo}`;
                
                loadIssues();
            } catch (error) {
                console.error('Failed to load project:', error);
                showNotification('加载项目失败', 'error');
            }
        }

        async function loadIssues() {
            try {
                const issuesData = await IssueService.list(currentOwner, currentRepo);
                const issues = issuesData.data || [];
                
                const openIssues = issues.filter(i => !i.is_closed);
                const closedIssues = issues.filter(i => i.is_closed);
                
                document.getElementById('open-count').textContent = openIssues.length;
                document.getElementById('closed-count').textContent = closedIssues.length;
                document.getElementById('all-count').textContent = issues.length;
                document.getElementById('issues-count').textContent = openIssues.length;
                
                let displayIssues = issues;
                if (currentFilter === 'open') {
                    displayIssues = openIssues;
                } else if (currentFilter === 'closed') {
                    displayIssues = closedIssues;
                }
                
                const issuesList = document.getElementById('issues-list');
                issuesList.innerHTML = '';
                
                if (displayIssues.length === 0) {
                    issuesList.innerHTML = '<div class="loading">暂无 Issue</div>';
                    return;
                }
                
                displayIssues.forEach(issue => {
                    const row = document.createElement('div');
                    row.className = 'issue-row';
                    row.innerHTML = `
                        <div class="issue-checkbox">
                            <input type="checkbox">
                        </div>
                        <div class="issue-icon ${issue.is_closed ? 'closed' : 'open'}">
                            <i class="fas fa-${issue.is_closed ? 'check-circle' : 'exclamation-circle'}"></i>
                        </div>
                        <div class="issue-content">
                            <div class="issue-title">
                                <a href="#">${issue.title}</a>
                            </div>
                            <div class="issue-meta">
                                <a href="#">#${issue.number}</a> · ${issue.is_closed ? '关闭' : '打开'}于 ${formatTime(issue.created_at)} · <a href="#">${issue.author || 'unknown'}</a>
                            </div>
                        </div>
                    `;
                    issuesList.appendChild(row);
                });
                
                document.getElementById('pagination-info').textContent = `显示 1-${displayIssues.length} 条，共 ${displayIssues.length} 条`;
                
                try {
                    const mrsData = await MergeRequestService.list(currentOwner, currentRepo);
                    const openMRs = mrsData.data ? mrsData.data.filter(m => !m.is_closed && !m.is_merged).length : 0;
                    document.getElementById('mrs-count').textContent = openMRs;
                } catch (e) {
                    console.log('No merge requests');
                }
                
            } catch (error) {
                console.error('Failed to load issues:', error);
                showNotification('加载 Issue 失败', 'error');
            }
        }

        document.getElementById('tab-open').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'open';
            document.querySelectorAll('.issues-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-open').classList.add('active');
            loadIssues();
        });

        document.getElementById('tab-closed').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'closed';
            document.querySelectorAll('.issues-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-closed').classList.add('active');
            loadIssues();
        });

        document.getElementById('tab-all').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'all';
            document.querySelectorAll('.issues-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-all').classList.add('active');
            loadIssues();
        });

        initIssuesPage();
    </script>
</body>
</html>
