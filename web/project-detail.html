<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - GitFolio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        .project-detail-page {
            max-width: 100%;
        }

        .project-header {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .project-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .project-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .project-title-section h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .project-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .project-breadcrumb a:hover {
            text-decoration: underline;
        }

        .project-actions-bar {
            display: flex;
            gap: 10px;
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .project-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }

        .project-tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-tab:hover {
            color: var(--text-primary);
            background: var(--bg-color);
        }

        .project-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-color);
        }

        .project-tab .badge {
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .project-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .project-layout {
                grid-template-columns: 1fr;
            }
        }

        .main-content {
            min-width: 0;
        }

        .file-browser {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .file-browser-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }

        .branch-selector {
            display: flex;
            gap: 10px;
        }

        .branch-dropdown {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .branch-dropdown:hover {
            border-color: var(--primary-color);
        }

        .branch-selector {
            position: relative;
        }

        .branch-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: var(--shadow-hover);
            min-width: 200px;
            z-index: 100;
            margin-top: 4px;
        }

        .branch-menu-header {
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        .branch-option {
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .branch-option:hover {
            background: var(--bg-color);
        }

        .branch-option.active {
            color: var(--primary-color);
        }

        .path-breadcrumb {
            padding: 10px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .path-breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .path-breadcrumb a:hover {
            text-decoration: underline;
        }

        .path-breadcrumb span {
            color: var(--text-secondary);
        }

        .file-browser-actions {
            display: flex;
            gap: 8px;
        }

        .commit-info {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .commit-info-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .commit-info-message {
            flex: 1;
        }

        .commit-info-message a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .commit-info-message a:hover {
            color: var(--primary-color);
        }

        .commit-info-meta {
            color: var(--text-muted);
            margin-left: 8px;
        }

        .commit-info-hash {
            font-family: monospace;
            color: var(--primary-color);
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .file-list {
            border-radius: 0 0 8px 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: var(--bg-color);
        }

        .file-icon {
            width: 20px;
            margin-right: 10px;
            text-align: center;
            color: var(--text-muted);
        }

        .file-icon.folder {
            color: var(--info-color);
        }

        .file-name {
            flex: 1;
            font-size: 14px;
        }

        .file-name a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .file-name a:hover {
            color: var(--primary-color);
        }

        .file-commit-message {
            flex: 2;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 0 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-commit-time {
            font-size: 12px;
            color: var(--text-muted);
            width: 120px;
            text-align: right;
        }

        .readme-section {
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .readme-header {
            padding: 12px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .readme-content {
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .readme-content h1 {
            font-size: 24px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .readme-content h2 {
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .readme-content h3 {
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .readme-content p {
            margin-bottom: 12px;
        }

        .readme-content ul, .readme-content ol {
            margin-bottom: 12px;
            padding-left: 24px;
        }

        .readme-content li {
            margin-bottom: 6px;
        }

        .readme-content code {
            background: var(--bg-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        .readme-content pre {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
        }

        .readme-content pre code {
            background: none;
            padding: 0;
        }

        .sidebar-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .info-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clone-box {
            display: flex;
            margin-bottom: 8px;
        }

        .clone-url {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-size: 12px;
            font-family: monospace;
            background: var(--bg-color);
        }

        .clone-btn {
            padding: 8px 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            transition: var(--transition);
        }

        .clone-btn:hover {
            background: var(--primary-hover);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .stat-value {
            font-weight: 500;
            font-size: 13px;
        }

        .contributors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .contributor-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        .contributor-avatar:hover {
            transform: scale(1.1);
        }

        .language-bar {
            height: 8px;
            border-radius: 4px;
            background: var(--bg-color);
            overflow: hidden;
            margin-bottom: 12px;
        }

        .language-bar-fill {
            height: 100%;
            background: var(--primary-color);
        }

        .project-visibility {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .project-visibility.private {
            background: var(--warning-color);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="/" class="logo">
                    <i class="fas fa-code-branch"></i>
                    <span>GitFolio</span>
                </a>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索项目、Issue、合并请求...">
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <div class="user-menu">
                    <img src="https://via.placeholder.com/32" alt="用户头像" class="avatar">
                    <span class="username">ryan</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <a href="/" class="nav-item">
                            <i class="fas fa-home"></i>
                            <span>仪表盘</span>
                        </a>
                        <a href="/projects" class="nav-item active">
                            <i class="fas fa-folder"></i>
                            <span>项目</span>
                        </a>
                        <a href="/groups" class="nav-item">
                            <i class="fas fa-users"></i>
                            <span>群组</span>
                        </a>
                        <a href="/activity" class="nav-item">
                            <i class="fas fa-chart-line"></i>
                            <span>活动</span>
                        </a>
                        <a href="/milestones" class="nav-item">
                            <i class="fas fa-flag"></i>
                            <span>里程碑</span>
                        </a>
                        <a href="/snippets" class="nav-item">
                            <i class="fas fa-code"></i>
                            <span>代码片段</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <main class="content">
                <div class="project-detail-page">
                    <div class="project-header">
                        <div class="project-header-top">
                            <div class="project-title-section">
                                <h1 id="repo-name">加载中...</h1>
                                <span class="project-visibility" id="repo-visibility">公开</span>
                            </div>
                            <div class="project-actions-bar">
                                <button class="btn btn-sm" id="star-btn">
                                    <i class="fas fa-star"></i> 星标 <span id="stars-count">0</span>
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-code-branch"></i> Fork <span id="forks-count">0</span>
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-clone"></i> 克隆
                                </button>
                            </div>
                        </div>
                        <div class="project-breadcrumb">
                            <a href="#" id="owner-link">加载中</a>
                            <span>/</span>
                            <span id="repo-name-breadcrumb">加载中</span>
                        </div>
                        <p class="project-description" id="repo-description">加载中...</p>
                    </div>

                    <div class="project-tabs">
                        <a href="#" class="project-tab active" id="tab-code">
                            <i class="fas fa-code"></i>
                            代码
                        </a>
                        <a href="#" class="project-tab" id="tab-issues">
                            <i class="fas fa-exclamation-circle"></i>
                            Issue
                            <span class="badge" id="issues-count">0</span>
                        </a>
                        <a href="#" class="project-tab" id="tab-mrs">
                            <i class="fas fa-code-branch"></i>
                            合并请求
                            <span class="badge" id="mrs-count">0</span>
                        </a>
                        <a href="#" class="project-tab" id="tab-releases">
                            <i class="fas fa-cube"></i>
                            发布
                        </a>
                        <a href="#" class="project-tab" id="tab-stats">
                            <i class="fas fa-chart-line"></i>
                            统计
                        </a>
                        <a href="#" class="project-tab" id="tab-settings">
                            <i class="fas fa-cog"></i>
                            设置
                        </a>
                    </div>

                    <div class="project-layout">
                        <div class="main-content">
                            <div class="file-browser">
                                <div class="file-browser-header">
                                    <div class="branch-selector">
                                        <div class="branch-dropdown" id="branch-dropdown">
                                            <i class="fas fa-code-branch"></i>
                                            <span id="current-branch">main</span>
                                            <i class="fas fa-chevron-down"></i>
                                        </div>
                                        <div class="branch-menu" id="branch-menu" style="display: none;">
                                            <div class="branch-menu-header">切换分支</div>
                                            <div class="branch-option active" data-branch="main">
                                                <i class="fas fa-check"></i> main
                                            </div>
                                            <div class="branch-option" data-branch="develop">
                                                <i class="fas fa-check" style="visibility: hidden;"></i> develop
                                            </div>
                                            <div class="branch-option" data-branch="feature">
                                                <i class="fas fa-check" style="visibility: hidden;"></i> feature
                                            </div>
                                        </div>
                                        <div class="branch-dropdown" id="tag-dropdown">
                                            <i class="fas fa-tags"></i>
                                            <span>标签</span>
                                            <i class="fas fa-chevron-down"></i>
                                        </div>
                                        <div class="branch-menu" id="tag-menu" style="display: none;">
                                            <div class="branch-menu-header">切换标签</div>
                                            <div class="branch-option" data-tag="v1.0.0">
                                                <i class="fas fa-check" style="visibility: hidden;"></i> v1.0.0
                                            </div>
                                            <div class="branch-option" data-tag="v0.9.0">
                                                <i class="fas fa-check" style="visibility: hidden;"></i> v0.9.0
                                            </div>
                                        </div>
                                    </div>
                                    <div class="file-browser-actions">
                                        <button class="btn btn-sm">
                                            <i class="fas fa-plus"></i> 添加文件
                                        </button>
                                        <button class="btn btn-sm">
                                            <i class="fas fa-download"></i> 下载
                                        </button>
                                        <button class="btn btn-sm">
                                            <i class="fas fa-history"></i> 历史
                                        </button>
                                    </div>
                                </div>

                                <div class="path-breadcrumb" id="path-breadcrumb">
                                    <a href="#" onclick="navigateToPath(''); return false;">
                                        <i class="fas fa-folder"></i> <span id="repo-name-path">repo</span>
                                    </a>
                                </div>

                                <div class="commit-info">
                                    <img src="https://via.placeholder.com/24" alt="提交者" class="commit-info-avatar">
                                    <div class="commit-info-message">
                                        <a href="#">初始提交</a>
                                        <span class="commit-info-meta">· 提交于最近</span>
                                    </div>
                                    <span class="commit-info-hash">initial</span>
                                </div>

                                <div class="file-list" id="file-list">
                                    <div class="loading">加载中...</div>
                                </div>
                            </div>

                            <div class="readme-section" id="readme-section" style="display: none;">
                                <div class="readme-header">
                                    <i class="fas fa-book"></i>
                                    README.md
                                </div>
                                <div class="readme-content" id="readme-content">
                                </div>
                            </div>
                        </div>

                        <div class="sidebar-info">
                            <div class="info-card">
                                <h3><i class="fas fa-download"></i> 克隆</h3>
                                <div class="clone-box">
                                    <input type="text" class="clone-url" id="clone-https" value="加载中..." readonly>
                                    <button class="clone-btn" onclick="copyToClipboard(document.getElementById('clone-https').value)">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                                <div class="clone-box">
                                    <input type="text" class="clone-url" id="clone-ssh" value="加载中..." readonly>
                                    <button class="clone-btn" onclick="copyToClipboard(document.getElementById('clone-ssh').value)">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="info-card">
                                <h3><i class="fas fa-eye"></i> 关注</h3>
                                <div class="stat-row">
                                    <span class="stat-label">星标</span>
                                    <span class="stat-value" id="watch-stars">0</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Fork</span>
                                    <span class="stat-value" id="watch-forks">0</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">关注</span>
                                    <span class="stat-value" id="watch-watchers">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/api.js?v=3"></script>
    <script src="/static/app.js?v=3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

                ],
                'replace': [
                    { name: 'replacer.go', type: 'file', message: 'Implement replacer', time: '2 weeks ago' },
                ],
                'rename': [
                    { name: 'renamer.go', type: 'file', message: 'Implement renamer', time: '2 weeks ago' },
                ]
            }
        };

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('path-breadcrumb');
            const repoNamePath = document.getElementById('repo-name-path');
            repoNamePath.textContent = currentRepo;
            
            if (!currentPath) {
                breadcrumb.innerHTML = `
                    <a href="#" onclick="navigateToPath(''); return false;">
                        <i class="fas fa-folder"></i> ${currentRepo}
                    </a>
                `;
                return;
            }
            
            const parts = currentPath.split('/');
            let html = `<a href="#" onclick="navigateToPath(''); return false;">
                <i class="fas fa-folder"></i> ${currentRepo}
            </a>`;
            
            let accumulated = '';
            parts.forEach((part, index) => {
                accumulated = accumulated ? `${accumulated}/${part}` : part;
                const path = accumulated;
                html += ` <span>/</span> <a href="#" onclick="navigateToPath('${path}'); return false;">${part}</a>`;
            });
            
            breadcrumb.innerHTML = html;
        }

        function navigateToPath(path) {
            currentPath = path;
            updateBreadcrumb();
            renderFileList();
        }

        function renderFileList() {
            const fileList = document.getElementById('file-list');
            const repoFiles = fileTree[currentRepo] || {};
            const files = repoFiles[currentPath] || [];
            
            if (files.length === 0) {
                fileList.innerHTML = '<div class="loading">此目录为空</div>';
                return;
            }
            
            fileList.innerHTML = files.map(f => `
                <div class="file-item" onclick="${f.type === 'folder' ? `navigateToPath('${currentPath ? currentPath + '/' : ''}${f.name}')` : ''}" style="cursor: ${f.type === 'folder' ? 'pointer' : 'default'}">
                    <span class="file-icon ${f.type === 'folder' ? 'folder' : ''}">
                        <i class="fas ${f.type === 'folder' ? 'fa-folder' : 'fa-file-code'}"></i>
                    </span>
                    <span class="file-name"><a href="#" onclick="event.preventDefault(); ${f.type === 'folder' ? `navigateToPath('${currentPath ? currentPath + '/' : ''}${f.name}')` : ''}">${f.name}</a></span>
                    <span class="file-commit-message">${f.message}</span>
                    <span class="file-commit-time">${f.time}</span>
                </div>
            `).join('');
        }

        function toggleBranchMenu() {
            const menu = document.getElementById('branch-menu');
            const tagMenu = document.getElementById('tag-menu');
            tagMenu.style.display = 'none';
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function toggleTagMenu() {
            const menu = document.getElementById('tag-menu');
            const branchMenu = document.getElementById('branch-menu');
            branchMenu.style.display = 'none';
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function switchBranch(branch) {
            currentBranch = branch;
            document.getElementById('current-branch').textContent = branch;
            document.querySelectorAll('#branch-menu .branch-option').forEach(opt => {
                const checkIcon = opt.querySelector('i');
                if (opt.dataset.branch === branch) {
                    opt.classList.add('active');
                    checkIcon.style.visibility = 'visible';
                } else {
                    opt.classList.remove('active');
                    checkIcon.style.visibility = 'hidden';
                }
            });
            document.getElementById('branch-menu').style.display = 'none';
            showNotification(`已切换到分支 ${branch}`, 'success');
        }

        async function initProjectDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            currentOwner = urlParams.get('owner');
            currentRepo = urlParams.get('repo');

            if (!currentOwner || !currentRepo) {
                showNotification('缺少项目参数', 'error');
                return;
            }

            try {
                const repoData = await RepositoryService.get(currentOwner, currentRepo);
                
                document.getElementById('repo-name').textContent = repoData.name;
                document.getElementById('repo-name-breadcrumb').textContent = repoData.name;
                document.getElementById('owner-link').textContent = currentOwner;
                document.getElementById('owner-link').href = `/projects?owner=${currentOwner}`;
                document.getElementById('repo-description').textContent = repoData.description || '暂无描述';
                document.getElementById('repo-visibility').textContent = repoData.is_private ? '私有' : '公开';
                document.getElementById('repo-visibility').classList.toggle('private', repoData.is_private);
                
                document.getElementById('stars-count').textContent = repoData.stars_count || 0;
                document.getElementById('forks-count').textContent = repoData.forks_count || 0;
                document.getElementById('watch-stars').textContent = repoData.stars_count || 0;
                document.getElementById('watch-forks').textContent = repoData.forks_count || 0;
                document.getElementById('watch-watchers').textContent = repoData.watch_count || 0;
                document.getElementById('current-branch').textContent = repoData.default_branch || 'main';
                currentBranch = repoData.default_branch || 'main';
                
                const cloneHttps = `https://git.home504.io/${currentOwner}/${repoData.name}.git`;
                const cloneSsh = `git@git.home504.io:${currentOwner}/${repoData.name}.git`;
                document.getElementById('clone-https').value = cloneHttps;
                document.getElementById('clone-ssh').value = cloneSsh;
                
                document.getElementById('tab-code').href = `/project-detail?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-issues').href = `/issues?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-mrs').href = `/merge-requests?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-releases').href = `/releases?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-stats').href = `/stats?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-settings').href = `/settings?owner=${currentOwner}&repo=${currentRepo}`;
                
                if (repoData.readme) {
                    const readmeSection = document.getElementById('readme-section');
                    const readmeContent = document.getElementById('readme-content');
                    readmeContent.innerHTML = marked.parse(repoData.readme);
                    readmeSection.style.display = 'block';
                    hljs.highlightAll();
                }
                
                updateBreadcrumb();
                renderFileList();
                
                try {
                    const issuesData = await IssueService.list(currentOwner, currentRepo);
                    const openIssues = issuesData.data ? issuesData.data.filter(i => !i.is_closed).length : 0;
                    document.getElementById('issues-count').textContent = openIssues;
                } catch (e) {
                    console.log('No issues');
                }
                
                try {
                    const mrsData = await MergeRequestService.list(currentOwner, currentRepo);
                    const openMRs = mrsData.data ? mrsData.data.filter(m => !m.is_closed && !m.is_merged).length : 0;
                    document.getElementById('mrs-count').textContent = openMRs;
                } catch (e) {
                    console.log('No merge requests');
                }
                
            } catch (error) {
                console.error('Failed to load project:', error);
                showNotification('加载项目失败', 'error');
            }
        }

        document.getElementById('branch-dropdown').addEventListener('click', toggleBranchMenu);
        document.getElementById('tag-dropdown').addEventListener('click', toggleTagMenu);
        
        document.querySelectorAll('#branch-menu .branch-option').forEach(opt => {
            opt.addEventListener('click', () => switchBranch(opt.dataset.branch));
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#branch-dropdown') && !e.target.closest('#branch-menu')) {
                document.getElementById('branch-menu').style.display = 'none';
            }
            if (!e.target.closest('#tag-dropdown') && !e.target.closest('#tag-menu')) {
                document.getElementById('tag-menu').style.display = 'none';
            }
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('已复制到剪贴板', 'success');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        initProjectDetail();
    </script>
</body>
</html>
