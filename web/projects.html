<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - GitFolio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .projects-page {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
        }

        .filters-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-filter {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-filter input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-filter input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-filter i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            overflow: hidden;
        }

        .project-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .project-card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .project-card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .project-card-title h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .project-card-title h3 a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .project-card-title h3 a:hover {
            color: var(--primary-color);
        }

        .project-visibility {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(31, 117, 203, 0.1);
            color: var(--info-color);
        }

        .project-visibility.private {
            background: rgba(201, 28, 0, 0.1);
            color: var(--danger-color);
        }

        .project-card-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-card-body {
            padding: 20px;
        }

        .project-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .project-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .project-stat i {
            font-size: 14px;
        }

        .project-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topic-tag {
            padding: 4px 10px;
            background: var(--bg-color);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: var(--transition);
            cursor: pointer;
        }

        .topic-tag:hover {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .project-card-footer {
            padding: 15px 20px;
            background: var(--bg-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-last-activity {
            font-size: 12px;
            color: var(--text-muted);
        }

        .project-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 16px 0;
        }

        .pagination-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(252, 109, 38, 0.05);
        }

        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 16px;
        }

        .pagination-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="/" class="logo">
                    <i class="fas fa-code-branch"></i>
                    <span>GitFolio</span>
                </a>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索项目、Issue、合并请求...">
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <div class="user-menu">
                    <img src="https://via.placeholder.com/32" alt="用户头像" class="avatar">
                    <span class="username">ryan</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <a href="/" class="nav-item">
                            <i class="fas fa-home"></i>
                            <span>仪表盘</span>
                        </a>
                        <a href="/projects" class="nav-item active">
                            <i class="fas fa-folder"></i>
                            <span>项目</span>
                        </a>
                        <a href="/groups" class="nav-item">
                            <i class="fas fa-users"></i>
                            <span>群组</span>
                        </a>
                        <a href="/activity" class="nav-item">
                            <i class="fas fa-chart-line"></i>
                            <span>活动</span>
                        </a>
                        <a href="/milestones" class="nav-item">
                            <i class="fas fa-flag"></i>
                            <span>里程碑</span>
                        </a>
                        <a href="/snippets" class="nav-item">
                            <i class="fas fa-code"></i>
                            <span>代码片段</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <main class="content">
                <div class="projects-page">
                    <div class="page-header">
                        <h1 class="page-title">项目</h1>
                        <button class="btn btn-sm">
                            <i class="fas fa-plus"></i>
                            新建项目
                        </button>
                    </div>

                    <div class="filters-bar">
                        <div class="search-filter">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="搜索项目...">
                        </div>

                        <div class="filter-group">
                            <label class="filter-label">排序：</label>
                            <select class="filter-select">
                                <option>最近更新</option>
                                <option>名称</option>
                                <option>创建时间</option>
                                <option>星标数</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <label class="filter-label">可见性：</label>
                            <select class="filter-select">
                                <option>全部</option>
                                <option>公开</option>
                                <option>私有</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <label class="filter-label">语言：</label>
                            <select class="filter-select">
                                <option>全部</option>
                                <option>JavaScript</option>
                                <option>TypeScript</option>
                                <option>Python</option>
                                <option>Go</option>
                                <option>Rust</option>
                            </select>
                        </div>
                    </div>

                    <div class="projects-grid">
                        <div class="loading">加载中...</div>
                    </div>

                    <div class="pagination">
                        <span class="pagination-info">加载中...</span>
                        <div class="pagination-nav">
                            <button class="pagination-btn" disabled>
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button class="pagination-btn active">1</button>
                            <button class="pagination-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/api.js?v=3"></script>
    <script src="/static/app.js?v=3"></script>
</body>
</html>
