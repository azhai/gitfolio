<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合并请求 - gitfolio-core - GitFolio</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .merge-requests-page {
            max-width: 100%;
        }

        .project-header {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .project-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .project-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .project-title-section h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .project-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .project-breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .project-breadcrumb a:hover {
            text-decoration: underline;
        }

        .project-actions-bar {
            display: flex;
            gap: 10px;
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .project-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }

        .project-tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-tab:hover {
            color: var(--text-primary);
            background: var(--bg-color);
        }

        .project-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-color);
        }

        .project-tab .badge {
            position: static;
            background: var(--bg-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .project-tab.active .badge {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .mr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .mr-title {
            font-size: 24px;
            font-weight: 600;
        }

        .mr-tabs {
            display: flex;
            gap: 0;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .mr-tab {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mr-tab:hover {
            color: var(--text-primary);
            background: var(--bg-color);
        }

        .mr-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-color);
        }

        .mr-tab .count {
            padding: 2px 8px;
            background: var(--bg-color);
            border-radius: 12px;
            font-size: 11px;
        }

        .mr-tab.active .count {
            background: rgba(252, 109, 38, 0.1);
            color: var(--primary-color);
        }

        .mr-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-mr {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-mr input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-mr input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-mr i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-dropdown {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-dropdown:hover {
            border-color: var(--primary-color);
        }

        .mr-list {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .mr-row {
            display: flex;
            align-items: flex-start;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .mr-row:last-child {
            border-bottom: none;
        }

        .mr-row:hover {
            background: var(--bg-color);
        }

        .mr-icon {
            width: 20px;
            margin-right: 12px;
            margin-top: 2px;
        }

        .mr-icon.open {
            color: var(--info-color);
        }

        .mr-icon.merged {
            color: var(--success-color);
        }

        .mr-icon.closed {
            color: var(--danger-color);
        }

        .mr-content {
            flex: 1;
        }

        .mr-row-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .mr-row-title a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .mr-row-title a:hover {
            color: var(--primary-color);
        }

        .mr-labels {
            display: inline-flex;
            gap: 6px;
            margin-left: 8px;
        }

        .mr-label {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .mr-label.feature {
            background: rgba(31, 117, 203, 0.1);
            color: var(--info-color);
        }

        .mr-label.bugfix {
            background: rgba(201, 28, 0, 0.1);
            color: var(--danger-color);
        }

        .mr-label.refactor {
            background: rgba(128, 91, 183, 0.1);
            color: #805bb7;
        }

        .mr-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .mr-meta a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .mr-meta a:hover {
            color: var(--primary-color);
        }

        .mr-branch {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .mr-assignees {
            display: flex;
            margin-left: 15px;
        }

        .mr-assignee {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            margin-left: -8px;
        }

        .mr-assignee:first-child {
            margin-left: 0;
        }

        .mr-comments {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .new-mr-btn {
            background: var(--success-color);
            color: white;
        }

        .new-mr-btn:hover {
            background: #0d6d3b;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 16px 0;
        }

        .pagination-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(252, 109, 38, 0.05);
        }

        .pagination-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 16px;
        }

        .pagination-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="/" class="logo">
                    <i class="fas fa-code-branch"></i>
                    <span>GitFolio</span>
                </a>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索项目、Issue、合并请求...">
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <div class="user-menu">
                    <img src="https://via.placeholder.com/32" alt="用户头像" class="avatar">
                    <span class="username">ryan</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-section">
                        <a href="/" class="nav-item">
                            <i class="fas fa-home"></i>
                            <span>仪表盘</span>
                        </a>
                        <a href="/projects" class="nav-item active">
                            <i class="fas fa-folder"></i>
                            <span>项目</span>
                        </a>
                        <a href="/groups" class="nav-item">
                            <i class="fas fa-users"></i>
                            <span>群组</span>
                        </a>
                        <a href="/activity" class="nav-item">
                            <i class="fas fa-chart-line"></i>
                            <span>活动</span>
                        </a>
                        <a href="/milestones" class="nav-item">
                            <i class="fas fa-flag"></i>
                            <span>里程碑</span>
                        </a>
                        <a href="/snippets" class="nav-item">
                            <i class="fas fa-code"></i>
                            <span>代码片段</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <main class="content">
                <div class="merge-requests-page">
                    <div class="project-header">
                        <div class="project-header-top">
                            <div class="project-title-section">
                                <h1 id="repo-name">加载中...</h1>
                                <span class="project-visibility" id="repo-visibility">公开</span>
                            </div>
                            <div class="project-actions-bar">
                                <button class="btn btn-sm">
                                    <i class="fas fa-star"></i> 星标
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-code-branch"></i> Fork
                                </button>
                                <button class="btn btn-sm">
                                    <i class="fas fa-clone"></i> 克隆
                                </button>
                            </div>
                        </div>
                        <div class="project-breadcrumb">
                            <a href="#" id="owner-link">加载中</a>
                            <span>/</span>
                            <span id="repo-name-breadcrumb">加载中</span>
                        </div>
                        <p class="project-description" id="repo-description">加载中...</p>
                    </div>

                    <div class="project-tabs">
                        <a href="#" class="project-tab" id="tab-code">
                            <i class="fas fa-code"></i>
                            代码
                        </a>
                        <a href="#" class="project-tab" id="tab-issues">
                            <i class="fas fa-exclamation-circle"></i>
                            Issue
                            <span class="badge" id="issues-count">0</span>
                        </a>
                        <a href="#" class="project-tab active" id="tab-mrs">
                            <i class="fas fa-code-branch"></i>
                            合并请求
                            <span class="badge" id="mrs-count">0</span>
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-cube"></i>
                            发布
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-chart-line"></i>
                            统计
                        </a>
                        <a href="#" class="project-tab">
                            <i class="fas fa-cog"></i>
                            设置
                        </a>
                    </div>

                    <div class="mr-header">
                        <h1 class="mr-title">合并请求</h1>
                        <button class="btn new-mr-btn">
                            <i class="fas fa-plus"></i> 新建合并请求
                        </button>
                    </div>

                    <div class="mr-tabs">
                        <a href="#" class="mr-tab active" id="tab-open">
                            <i class="fas fa-code-branch"></i>
                            打开
                            <span class="count" id="open-count">0</span>
                        </a>
                        <a href="#" class="mr-tab" id="tab-merged">
                            <i class="fas fa-check"></i>
                            已合并
                            <span class="count" id="merged-count">0</span>
                        </a>
                        <a href="#" class="mr-tab" id="tab-closed">
                            <i class="fas fa-times"></i>
                            已关闭
                            <span class="count" id="closed-count">0</span>
                        </a>
                        <a href="#" class="mr-tab" id="tab-all">
                            <i class="fas fa-list"></i>
                            全部
                            <span class="count" id="all-count">0</span>
                        </a>
                    </div>

                    <div class="mr-filters">
                        <div class="search-mr">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="搜索合并请求..." id="search-input">
                        </div>

                        <select class="filter-dropdown">
                            <option>作者</option>
                            <option>ryan</option>
                            <option>alice</option>
                            <option>bob</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>指派给</option>
                            <option>ryan</option>
                            <option>alice</option>
                            <option>bob</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>里程碑</option>
                            <option>v2.0.0</option>
                            <option>v1.5.0</option>
                        </select>

                        <select class="filter-dropdown">
                            <option>排序</option>
                            <option>最近创建</option>
                            <option>最近更新</option>
                            <option>优先级</option>
                        </select>
                    </div>

                    <div class="mr-list" id="mr-list">
                        <div class="loading">加载中...</div>
                    </div>

                    <div class="pagination">
                        <span class="pagination-info" id="pagination-info">加载中...</span>
                        <div class="pagination-nav">
                            <button class="pagination-btn" disabled id="prev-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button class="pagination-btn active">1</button>
                            <button class="pagination-btn" disabled id="next-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/api.js?v=3"></script>
    <script src="/static/app.js?v=3"></script>
    <script>
        let currentOwner = '';
        let currentRepo = '';
        let currentFilter = 'open';

        async function initMRsPage() {
            const urlParams = new URLSearchParams(window.location.search);
            currentOwner = urlParams.get('owner');
            currentRepo = urlParams.get('repo');

            if (!currentOwner || !currentRepo) {
                showNotification('缺少项目参数', 'error');
                return;
            }

            try {
                const repoData = await RepositoryService.get(currentOwner, currentRepo);
                
                document.getElementById('repo-name').textContent = repoData.name;
                document.getElementById('repo-name-breadcrumb').textContent = repoData.name;
                document.getElementById('owner-link').textContent = currentOwner;
                document.getElementById('owner-link').href = `/projects?owner=${currentOwner}`;
                document.getElementById('repo-description').textContent = repoData.description || '暂无描述';
                document.getElementById('repo-visibility').textContent = repoData.is_private ? '私有' : '公开';
                
                document.getElementById('tab-code').href = `/project-detail?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-issues').href = `/issues?owner=${currentOwner}&repo=${currentRepo}`;
                document.getElementById('tab-mrs').href = `/merge-requests?owner=${currentOwner}&repo=${currentRepo}`;
                
                loadMRs();
            } catch (error) {
                console.error('Failed to load project:', error);
                showNotification('加载项目失败', 'error');
            }
        }

        async function loadMRs() {
            try {
                const mrsData = await MergeRequestService.list(currentOwner, currentRepo);
                const mrs = mrsData.data || [];
                
                const openMRs = mrs.filter(m => !m.is_closed && !m.is_merged);
                const mergedMRs = mrs.filter(m => m.is_merged);
                const closedMRs = mrs.filter(m => m.is_closed && !m.is_merged);
                
                document.getElementById('open-count').textContent = openMRs.length;
                document.getElementById('merged-count').textContent = mergedMRs.length;
                document.getElementById('closed-count').textContent = closedMRs.length;
                document.getElementById('all-count').textContent = mrs.length;
                document.getElementById('mrs-count').textContent = openMRs.length;
                
                let displayMRs = mrs;
                if (currentFilter === 'open') {
                    displayMRs = openMRs;
                } else if (currentFilter === 'merged') {
                    displayMRs = mergedMRs;
                } else if (currentFilter === 'closed') {
                    displayMRs = closedMRs;
                }
                
                const mrList = document.getElementById('mr-list');
                mrList.innerHTML = '';
                
                if (displayMRs.length === 0) {
                    mrList.innerHTML = '<div class="loading">暂无合并请求</div>';
                    return;
                }
                
                displayMRs.forEach(mr => {
                    const row = document.createElement('div');
                    row.className = 'mr-row';
                    
                    let iconClass = 'open';
                    let iconName = 'code-branch';
                    if (mr.is_merged) {
                        iconClass = 'merged';
                        iconName = 'check';
                    } else if (mr.is_closed) {
                        iconClass = 'closed';
                        iconName = 'times';
                    }
                    
                    row.innerHTML = `
                        <div class="mr-icon ${iconClass}">
                            <i class="fas fa-${iconName}"></i>
                        </div>
                        <div class="mr-content">
                            <div class="mr-row-title">
                                <a href="#">${mr.title}</a>
                            </div>
                            <div class="mr-meta">
                                <a href="#">!${mr.number}</a> · <span class="mr-branch">${mr.source_branch} → ${mr.target_branch}</span> · ${mr.is_merged ? '合并' : (mr.is_closed ? '关闭' : '打开')}于 ${formatTime(mr.created_at)} · <a href="#">${mr.author || 'unknown'}</a>
                            </div>
                        </div>
                    `;
                    mrList.appendChild(row);
                });
                
                document.getElementById('pagination-info').textContent = `显示 1-${displayMRs.length} 条，共 ${displayMRs.length} 条`;
                
                try {
                    const issuesData = await IssueService.list(currentOwner, currentRepo);
                    const openIssues = issuesData.data ? issuesData.data.filter(i => !i.is_closed).length : 0;
                    document.getElementById('issues-count').textContent = openIssues;
                } catch (e) {
                    console.log('No issues');
                }
                
            } catch (error) {
                console.error('Failed to load merge requests:', error);
                showNotification('加载合并请求失败', 'error');
            }
        }

        document.getElementById('tab-open').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'open';
            document.querySelectorAll('.mr-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-open').classList.add('active');
            loadMRs();
        });

        document.getElementById('tab-merged').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'merged';
            document.querySelectorAll('.mr-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-merged').classList.add('active');
            loadMRs();
        });

        document.getElementById('tab-closed').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'closed';
            document.querySelectorAll('.mr-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-closed').classList.add('active');
            loadMRs();
        });

        document.getElementById('tab-all').addEventListener('click', (e) => {
            e.preventDefault();
            currentFilter = 'all';
            document.querySelectorAll('.mr-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-all').classList.add('active');
            loadMRs();
        });

        initMRsPage();
    </script>
</body>
</html>
